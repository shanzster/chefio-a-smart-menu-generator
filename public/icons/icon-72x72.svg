<?xml version="1.0" encoding="UTF-8"?>
<svg width="72" height="72" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ea580c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="72" height="72" fill="url(#grad)" rx="7.2"/>
  
  <!-- Chef hat -->
  <g transform="translate(36, 36)">
    <!-- Hat top (circle) -->
    <circle cx="0" cy="-7.2" r="18" fill="white"/>
    
    <!-- Hat base (rectangle) -->
    <rect x="-21.599999999999998" y="3.6" width="43.199999999999996" height="10.799999999999999" fill="white" rx="1.44"/>
    
    <!-- Letter C -->
    <text x="0" y="-3.6" 
          font-family="Arial, sans-serif" 
          font-size="25.2" 
          font-weight="bold" 
          fill="#f97316" 
          text-anchor="middle" 
          dominant-baseline="middle">C</text>
  </g>
  
  <!-- Utensils decoration -->
  <g transform="translate(14.4, 54)" opacity="0.3">
    <!-- Fork -->
    <path d="M 0 0 L 0 10.799999999999999 M -1.44 0 L -1.44 5.76 M 1.44 0 L 1.44 5.76" 
          stroke="white" stroke-width="1.08" fill="none" stroke-linecap="round"/>
  </g>
  
  <g transform="translate(57.6, 54)" opacity="0.3">
    <!-- Spoon -->
    <ellipse cx="0" cy="0" rx="1.8" ry="2.5200000000000005" fill="white"/>
    <rect x="-0.54" y="1.44" width="1.08" height="9.36" fill="white" rx="0.36"/>
  </g>
</svg>